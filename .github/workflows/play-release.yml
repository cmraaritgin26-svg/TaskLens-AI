name: Build Play Release Bundle

on:
  workflow_dispatch:

jobs:
  build-play-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Restore upload keystore
        run: |
          if [ -z "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" ]; then
            echo "Missing ANDROID_UPLOAD_KEYSTORE_BASE64 repository secret."
            exit 1
          fi
          echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build signed Play bundle
        env:
          ANDROID_UPLOAD_KEYSTORE: ${{ runner.temp }}/upload-keystore.jks
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: npm run play:bundle

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: health-task-tracker-play-bundle
          path: dist/play/*.aab
