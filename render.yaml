services:
  - type: web
    name: tasklens-ai-ai-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /status
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_TASK_MODEL
        value: gpt-4o-mini
      - key: ENABLE_GOOGLE_VISION
        value: "false"
      - key: ENABLE_TASK_BREAKDOWN_REPAIR
        value: "false"
      - key: GOOGLE_CLOUD_VISION_API_KEY
        sync: false
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: coral
      - key: ALLOWED_ORIGIN
        value: "*"
